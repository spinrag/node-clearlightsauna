<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clearlight Sauna API</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 2rem;
      width: 320px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    h1 { font-size: 1.25rem; margin: 0 0 1.5rem; color: #fff; }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid #1a1a2e;
    }
    .row:last-child { border-bottom: none; }
    .label { color: #8a8a9a; }
    .value { font-weight: 600; }
    .ok { color: #4ade80; }
    .degraded { color: #facc15; }
    .err { color: #f87171; }
    .loading { color: #8a8a9a; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Clearlight Sauna API</h1>
    <div class="row">
      <span class="label">Status</span>
      <span id="status" class="value loading">loading…</span>
    </div>
    <div class="row">
      <span class="label">Device</span>
      <span id="device" class="value loading">loading…</span>
    </div>
    <div class="row">
      <span class="label">Uptime</span>
      <span id="uptime" class="value loading">loading…</span>
    </div>
  </div>
  <script>
    function formatUptime(seconds) {
      const d = Math.floor(seconds / 86400);
      const h = Math.floor((seconds % 86400) / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      if (d > 0) return d + 'd ' + h + 'h ' + m + 'm';
      if (h > 0) return h + 'h ' + m + 'm';
      return m + 'm';
    }

    async function refresh() {
      try {
        const res = await fetch('/health');
        const data = await res.json();

        const statusEl = document.getElementById('status');
        statusEl.textContent = data.status;
        statusEl.className = 'value ' + (data.status === 'ok' ? 'ok' : 'degraded');

        const deviceEl = document.getElementById('device');
        deviceEl.textContent = data.device;
        deviceEl.className = 'value ' + (data.device === 'connected' ? 'ok' : 'degraded');

        document.getElementById('uptime').textContent = formatUptime(data.uptime);
        document.getElementById('uptime').className = 'value';
      } catch {
        document.getElementById('status').textContent = 'unreachable';
        document.getElementById('status').className = 'value err';
        document.getElementById('device').textContent = '—';
        document.getElementById('device').className = 'value err';
        document.getElementById('uptime').textContent = '—';
        document.getElementById('uptime').className = 'value err';
      }
    }

    refresh();
    setInterval(refresh, 10000);
  </script>
</body>
</html>
